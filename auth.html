<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sofacine — Entrá</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080709; --bg2: #111019; --bg3: #191821;
      --gold: #e8b86d; --gold-dim: #9a7438;
      --text: #f0eee8; --text-muted: #7a7880; --text-dim: #3a3840;
      --border: rgba(255,255,255,0.06); --border-gold: rgba(232,184,109,0.2);
      --error: #e07070;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-weight: 300;
      line-height: 1.6; min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* fondo grain */
    body::before {
      content: ''; position: fixed; inset: -50%; width: 200%; height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.4;
    }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem 2.5rem; border-bottom: 1px solid var(--border);
      position: relative; z-index: 10;
    }
    .logo { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: var(--gold); letter-spacing: -0.02em; text-decoration: none; }
    .logo span { font-style: italic; color: var(--text); }

    .auth-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 3rem 1.5rem; position: relative; z-index: 10;
    }

    .auth-card {
      width: 100%; max-width: 420px;
      background: rgba(17,16,25,0.95); backdrop-filter: blur(20px);
      border: 1px solid var(--border-gold); border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(232,184,109,0.04), 0 24px 48px rgba(0,0,0,0.5);
    }

    .auth-header {
      padding: 2rem 2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }

    .auth-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem; color: var(--text);
      margin-bottom: 0.4rem; letter-spacing: -0.02em;
    }

    .auth-header p { font-size: 0.85rem; color: var(--text-muted); }

    .tabs {
      display: flex; border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1; padding: 0.875rem; text-align: center;
      font-size: 0.82rem; font-weight: 500; cursor: pointer;
      color: var(--text-muted); border: none; background: none;
      transition: color 0.2s; letter-spacing: 0.03em;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      font-family: 'DM Sans', sans-serif;
    }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab:hover:not(.active) { color: var(--text); }

    .auth-body { padding: 1.75rem 2rem 2rem; }

    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block; font-size: 0.72rem; color: var(--text-muted);
      margin-bottom: 0.4rem; letter-spacing: 0.05em; text-transform: uppercase;
    }
    .form-group input {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 0.75rem 0.875rem; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 300;
      outline: none; transition: border-color 0.2s, background 0.2s;
    }
    .form-group input:focus { border-color: var(--gold-dim); background: rgba(232,184,109,0.03); }
    .form-group input::placeholder { color: var(--text-dim); }

    .btn-primary {
      width: 100%; background: var(--gold); color: #080709;
      border: none; border-radius: 8px; padding: 0.9rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 500;
      cursor: pointer; transition: background 0.2s, box-shadow 0.2s;
      letter-spacing: 0.03em; margin-top: 0.5rem;
    }
    .btn-primary:hover { background: #f0c97a; box-shadow: 0 4px 20px rgba(232,184,109,0.25); }
    .btn-primary:disabled { background: var(--gold-dim); cursor: not-allowed; box-shadow: none; }

    .msg {
      margin-top: 1rem; padding: 0.875rem 1rem;
      border-radius: 8px; font-size: 0.82rem; line-height: 1.5;
      display: none;
    }
    .msg.visible { display: block; }
    .msg.error { background: rgba(224,112,112,0.08); border: 1px solid rgba(224,112,112,0.2); color: var(--error); }
    .msg.success { background: rgba(58,138,92,0.08); border: 1px solid rgba(58,138,92,0.2); color: #6abf8a; }

    .divider {
      text-align: center; font-size: 0.75rem; color: var(--text-dim);
      margin: 1.25rem 0; position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%; width: calc(50% - 2rem);
      height: 1px; background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
  </style>
</head>
<body>
  <nav>
    <a href="/index.html" class="logo">sofa<span>cine</span></a>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Bienvenido</h1>
        <p>Creá tu perfil cinematográfico</p>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Ingresar</button>
        <button class="tab" onclick="switchTab('registro')">Crear cuenta</button>
      </div>

      <div class="auth-body">
        <!-- LOGIN -->
        <div class="form-panel active" id="panel-login">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="tu@email.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="login-pass">Contrasena</label>
            <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
          </div>
          <button class="btn-primary" id="btn-login" onclick="login()">Ingresar</button>
          <div class="msg" id="msg-login"></div>
        </div>

        <!-- REGISTRO -->
        <div class="form-panel" id="panel-registro">
          <div class="form-group">
            <label for="reg-username">Nombre de usuario</label>
            <input type="text" id="reg-username" placeholder="ej: cinefilo_py" autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="tu@email.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="reg-pass">Contrasena</label>
            <input type="password" id="reg-pass" placeholder="minimo 6 caracteres" autocomplete="new-password" />
          </div>
          <button class="btn-primary" id="btn-registro" onclick="registro()">Crear cuenta</button>
          <div class="msg" id="msg-registro"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabase = createClient(
      'https://wkuhwajoebdfntcokilx.supabase.co',
      'sb_publishable_3G7eC0rb4fcGHQKzq6qidQ_54IkDdtM'
    );

    window.switchTab = function(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
      document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
      document.getElementById(`panel-${tab}`).classList.add('active');
    };

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = `msg visible ${type}`;
    }

    window.login = async function() {
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-pass').value;
      if (!email || !pass) { showMsg('msg-login', 'Completa todos los campos', 'error'); return; }

      const btn = document.getElementById('btn-login');
      btn.disabled = true; btn.textContent = 'Ingresando...';

      const { error } = await supabase.auth.signInWithPassword({ email, password: pass });

      if (error) {
        showMsg('msg-login', 'Email o contrasena incorrectos', 'error');
        btn.disabled = false; btn.textContent = 'Ingresar';
      } else {
        showMsg('msg-login', 'Bienvenido! Redirigiendo...', 'success');
        setTimeout(() => window.location.href = '/', 1000);
      }
    };

    window.registro = async function() {
      const username = document.getElementById('reg-username').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const pass     = document.getElementById('reg-pass').value;

      if (!username || !email || !pass) { showMsg('msg-registro', 'Completa todos los campos', 'error'); return; }
      if (pass.length < 6) { showMsg('msg-registro', 'La contrasena debe tener al menos 6 caracteres', 'error'); return; }

      const btn = document.getElementById('btn-registro');
      btn.disabled = true; btn.textContent = 'Creando cuenta...';

      const { data, error } = await supabase.auth.signUp({ email, password: pass });

      if (error) {
        showMsg('msg-registro', error.message, 'error');
        btn.disabled = false; btn.textContent = 'Crear cuenta';
        return;
      }

      // Crear perfil en tabla perfiles
      if (data.user) {
        await supabase.from('perfiles').insert({
          id: data.user.id,
          username,
          bio: '',
          avatar_url: ''
        });
      }

      showMsg('msg-registro', 'Cuenta creada! Revisa tu email para confirmar.', 'success');
      btn.disabled = false; btn.textContent = 'Crear cuenta';
    };

    // Si ya esta logueado, redirigir al index
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = '/';
  </script>
</body>
</html>
